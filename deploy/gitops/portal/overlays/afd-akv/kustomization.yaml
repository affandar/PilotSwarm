apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Namespace fan-out (kustomize-level). Overrides any existing
# metadata.namespace and adds it where missing on every
# namespaceable resource — including the overlay-generated
# portal-env ConfigMap, which is required for nameReference
# rewriting (envFrom.configMapRef.name -> hashed) to work.
namespace: pilotswarm

# AFD + AKV path. AGIC + AppGw private FE behind Azure Front Door
# (Private Link). AKV-managed cert (issued by a registered issuer such
# as `OneCertV2-PublicCA` or the AKV `Self` issuer for OSS) is pushed to
# the AppGw via Bicep and bound by AGIC via the
# `appgw-ssl-certificate` annotation contributed by edge-appgw. The enterprise path /
# enterprise public path.

resources:
  - ../../base

components:
  - ../../components/edge-appgw
  - ../../components/tls-akv
  - ../../components/portal-replacements

configMapGenerator:
  - name: portal-env
    envs:
      - .env
