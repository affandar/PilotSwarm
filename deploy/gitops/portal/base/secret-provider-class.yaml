---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: pilotswarm-portal-secrets
  namespace: copilot-runtime
  labels:
    app.kubernetes.io/name: pilotswarm
    app.kubernetes.io/component: portal
spec:
  provider: azure
  # Synthesizes `pilotswarm-portal-secrets` mounted via envFrom.
  # Mirrors the portal's half of `scripts/deploy-aks.sh:104,118-126`:
  # DATABASE_URL (shared with worker) plus PORTAL_AUTH_* / PORTAL_AUTHZ_*
  # keys referenced by `packages/portal/auth/config.js` and
  # `packages/portal/auth/providers/entra.js`. AKV object names use
  # hyphenated lowercase (AKV naming rules); `secretObjects[].data[].key`
  # fields preserve the exact env var names (SC-006).
  parameters:
    usePodIdentity: "false"
    clientID: $(WORKLOAD_IDENTITY_CLIENT_ID)
    keyvaultName: $(KV_NAME)
    tenantId: $(AZURE_TENANT_ID)
    objects: |
      array:
        - |
          objectName: database-url
          objectType: secret
        - |
          objectName: portal-auth-provider
          objectType: secret
        - |
          objectName: portal-auth-entra-tenant-id
          objectType: secret
        - |
          objectName: portal-auth-entra-client-id
          objectType: secret
        - |
          objectName: portal-authz-default-role
          objectType: secret
        - |
          objectName: portal-authz-admin-groups
          objectType: secret
        - |
          objectName: portal-authz-user-groups
          objectType: secret
        - |
          objectName: portal-auth-allow-unauthenticated
          objectType: secret
        - |
          objectName: portal-auth-entra-admin-groups
          objectType: secret
        - |
          objectName: portal-auth-entra-user-groups
          objectType: secret
  secretObjects:
    - secretName: pilotswarm-portal-secrets
      type: Opaque
      data:
        - objectName: database-url
          key: DATABASE_URL
        - objectName: portal-auth-provider
          key: PORTAL_AUTH_PROVIDER
        - objectName: portal-auth-entra-tenant-id
          key: PORTAL_AUTH_ENTRA_TENANT_ID
        - objectName: portal-auth-entra-client-id
          key: PORTAL_AUTH_ENTRA_CLIENT_ID
        - objectName: portal-authz-default-role
          key: PORTAL_AUTHZ_DEFAULT_ROLE
        - objectName: portal-authz-admin-groups
          key: PORTAL_AUTHZ_ADMIN_GROUPS
        - objectName: portal-authz-user-groups
          key: PORTAL_AUTHZ_USER_GROUPS
        - objectName: portal-auth-allow-unauthenticated
          key: PORTAL_AUTH_ALLOW_UNAUTHENTICATED
        - objectName: portal-auth-entra-admin-groups
          key: PORTAL_AUTH_ENTRA_ADMIN_GROUPS
        - objectName: portal-auth-entra-user-groups
          key: PORTAL_AUTH_ENTRA_USER_GROUPS
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: pilotswarm-portal-tls
  namespace: copilot-runtime
  labels:
    app.kubernetes.io/name: pilotswarm
    app.kubernetes.io/component: portal
spec:
  provider: azure
  # AKV-managed certificate synthesized into a kubernetes.io/tls
  # Secret consumed by the Ingress `tls.secretName`. The certificate
  # lives in the same AKV as portal-secrets and shares the same UAMI,
  # so `clientID`/`keyvaultName`/`tenantId` replacements below target
  # `kind: SecretProviderClass` unselected-by-name (both SPCs).
  parameters:
    usePodIdentity: "false"
    clientID: $(WORKLOAD_IDENTITY_CLIENT_ID)
    keyvaultName: $(KV_NAME)
    tenantId: $(AZURE_TENANT_ID)
    objects: |
      array:
        - |
          objectName: pilotswarm-portal-tls
          objectType: secret
  secretObjects:
    - secretName: pilotswarm-portal-tls
      type: kubernetes.io/tls
      data:
        - objectName: pilotswarm-portal-tls
          key: tls.key
        - objectName: pilotswarm-portal-tls
          key: tls.crt
