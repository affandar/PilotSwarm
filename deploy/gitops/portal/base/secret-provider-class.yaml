---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: pilotswarm-portal-secrets
  labels:
    app.kubernetes.io/name: pilotswarm
    app.kubernetes.io/component: portal
spec:
  provider: azure
  # Synthesizes `pilotswarm-portal-secrets` mounted via envFrom.
  # NOTE: `database-url` was removed from KV in favor of the AAD passwordless
  # path: portal pods use workload identity + DefaultAzureCredential to
  # mint short-lived Postgres tokens (see packages/sdk/src/pg-pool-factory.ts).
  # The DATABASE_URL env var is still projected — but from the worker-env-style
  # ConfigMap (overlay .env), not from KV. AKV object names use hyphenated
  # lowercase (AKV naming rules); `secretObjects[].data[].key` fields preserve
  # the exact env var names (SC-006).
  #
  # LLM credentials (github-token / anthropic-api-key / azure-oai-key):
  # The portal does not invoke models, but the SDK's PilotSwarmManagementClient
  # constructs a ModelProviderRegistry at start which filters out providers
  # whose creds aren't resolvable from process.env, then validates the
  # configured `defaultModel` against the surviving set. Without these keys
  # the portal would crash with "No credentialed models are available after
  # provider filtering". Legacy deploy/k8s/portal-deployment.yaml shared the
  # worker's `copilot-runtime-secrets` envFrom for the same reason. We mirror
  # the worker keys here to preserve that startup behavior. Same KV objects,
  # same env var names — no separate copies in KV.
  #
  # Portal auth/authz config (PORTAL_AUTH_* / PORTAL_AUTHZ_*) used to be
  # mounted here as KV secrets. They are NOT credentials — they're identity
  # references (Entra tenant/client GUIDs, group object ids) and policy
  # knobs (provider name, default role, allow-unauth bool). They moved
  # to the overlay .env → `portal-env` ConfigMap path (envFrom configMapRef
  # in deployment.yaml) and are no longer projected by this SPC. The
  # portal runtime sentinel-strip in packages/app/web/server.js still drops
  # `__PS_UNSET__` values so unset config keys appear truly unset.
  parameters:
    usePodIdentity: "false"
    clientID: $(WORKLOAD_IDENTITY_CLIENT_ID)
    keyvaultName: $(KV_NAME)
    tenantId: $(AZURE_TENANT_ID)
    objects: |
      array:
        - |
          objectName: github-token
          objectType: secret
        - |
          objectName: anthropic-api-key
          objectType: secret
        - |
          objectName: azure-oai-key
          objectType: secret
  secretObjects:
    # NOTE: the `data[].key` list below is mirrored in
    # deploy/scripts/lib/spc-keys-hash.mjs (PORTAL_SPC_KEYS). Adding or
    # removing a key here REQUIRES updating that constant — otherwise
    # the pod-template hash won't reflect the change and existing pods
    # won't roll on first deploy of the new SPC.
    - secretName: pilotswarm-portal-secrets
      type: Opaque
      data:
        - objectName: github-token
          key: GITHUB_TOKEN
        - objectName: anthropic-api-key
          key: ANTHROPIC_API_KEY
        - objectName: azure-oai-key
          key: AZURE_OAI_KEY
