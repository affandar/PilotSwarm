apiVersion: apps/v1
kind: Deployment
metadata:
  name: pilotswarm-portal
  labels:
    app.kubernetes.io/name: pilotswarm
    app.kubernetes.io/component: portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pilotswarm
      app.kubernetes.io/component: portal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pilotswarm
        app.kubernetes.io/component: portal
        azure.workload.identity/use: "true"
      annotations:
        # SPC keys hash. Filled by the portal-replacements kustomize
        # component from `data.SPC_KEYS_HASH` in the env ConfigMap.
        # Forces a rolling update whenever the SecretProviderClass's
        # projected key set changes — works around the CSI driver's
        # async K8s Secret synthesis racing pod startup. See
        # deploy/scripts/lib/spc-keys-hash.mjs and
        # docs/bugreports/envfrom-secret-staleness-and-secretstore-proposal.md.
        pilotswarm.dev/spc-keys-hash: ""
    spec:
      serviceAccountName: pilotswarm-portal
      # imagePullSecrets intentionally omitted: AKS kubelet MI with AcrPull.
      containers:
        - name: portal
          # Placeholder image reference. Overlay replacements fill whole ref (FR-014).
          image: __IMAGE__
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: PORTAL_TUI_MODE
              value: "remote"
            - name: PLUGIN_DIRS
              value: "/app/packages/cli/plugins"
            # The CSI driver synthesizes a `kubernetes.io/tls` Secret
            # (`pilotswarm-portal-tls`) from the AKV-managed cert; we
            # mount that Secret separately below to get split
            # `tls.crt`/`tls.key` files. server.js reads these to
            # bootstrap HTTPS.
            - name: TLS_CERT_PATH
              value: /mnt/portal-tls-secret/tls.crt
            - name: TLS_KEY_PATH
              value: /mnt/portal-tls-secret/tls.key
            # Path to model_providers.json — drives the portal's
            # PilotSwarmManagementClient.listModels() / getModelsByProvider()
            # so the "+ Model" picker has entries. File is mounted from the
            # pilotswarm-portal-model-providers ConfigMap defined in the
            # base kustomization.yaml.
            - name: PS_MODEL_PROVIDERS_PATH
              value: "/app/config/model_providers.json"
          envFrom:
            - configMapRef:
                name: portal-env
            - secretRef:
                name: pilotswarm-portal-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
              scheme: HTTPS
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
          # Base mounts the auth-provider secrets-store volume (always
          # needed) and the portal-tls-secret Secret (mounts the
          # kubernetes.io/tls Secret containing tls.crt + tls.key). The
          # TLS Component (tls-akv | tls-letsencrypt) patches
          # `volumes[name=portal-tls-secret].secret.secretName` to the
          # right Secret, and tls-akv additionally appends a `portal-tls`
          # CSI volume + mount that drives the Secret Store CSI to
          # synthesize that Secret from AKV.
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
            - name: portal-tls-secret
              mountPath: /mnt/portal-tls-secret
              readOnly: true
            - name: model-providers
              mountPath: /app/config
              readOnly: true
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: pilotswarm-portal-secrets
        - name: portal-tls-secret
          secret:
            secretName: __TLS_SECRET_NAME__
        - name: model-providers
          configMap:
            name: pilotswarm-portal-model-providers
            items:
              - key: model_providers.json
                path: model_providers.json
      restartPolicy: Always
