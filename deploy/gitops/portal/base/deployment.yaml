apiVersion: apps/v1
kind: Deployment
metadata:
  name: pilotswarm-portal
  namespace: copilot-runtime
  labels:
    app.kubernetes.io/name: pilotswarm
    app.kubernetes.io/component: portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pilotswarm
      app.kubernetes.io/component: portal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pilotswarm
        app.kubernetes.io/component: portal
    spec:
      serviceAccountName: pilotswarm-portal
      # imagePullSecrets intentionally omitted: AKS kubelet MI with AcrPull.
      containers:
        - name: portal
          # Placeholder image reference. Overlay replacements fill whole ref (FR-014).
          image: __IMAGE__
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: PORTAL_TUI_MODE
              value: "remote"
            - name: PLUGIN_DIRS
              value: "/app/packages/cli/plugins"
          envFrom:
            - secretRef:
                name: pilotswarm-portal-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
            - name: portal-tls
              mountPath: /mnt/portal-tls
              readOnly: true
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: pilotswarm-portal-secrets
        - name: portal-tls
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: pilotswarm-portal-tls
      restartPolicy: Always
