apiVersion: v1
kind: ServiceAccount
metadata:
  name: pilotswarm-portal
  labels:
    app.kubernetes.io/name: pilotswarm
    app.kubernetes.io/component: portal
  annotations:
    # Federated with the BaseInfra-provisioned UAMI (Phase 3). Overlay
    # fills the clientID so the SA's projected token authenticates
    # both CSI driver AKV pulls (portal-secrets + TLS) and log-reader
    # Kubernetes API calls (via RoleBinding above).
    azure.workload.identity/client-id: __WORKLOAD_IDENTITY_CLIENT_ID__
