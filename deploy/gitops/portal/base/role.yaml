apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pilotswarm-portal-log-reader
  labels:
    app.kubernetes.io/name: pilotswarm
    app.kubernetes.io/component: portal
rules:
  - apiGroups: [""]
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
  - apiGroups: [""]
    resources:
      - pods/log
    verbs:
      - get
