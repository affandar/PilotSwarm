apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: pilotswarm-portal-tls
  labels:
    app.kubernetes.io/name: pilotswarm
    app.kubernetes.io/component: portal
spec:
  provider: azure
  # AKV-managed certificate synthesized into a kubernetes.io/tls Secret
  # (`pilotswarm-portal-tls`) consumed by the Deployment's
  # `portal-tls-secret` volume. The cert lives in the same AKV as
  # portal-secrets and shares the same UAMI; clientID/keyvaultName/tenantId
  # are filled in by the portal-replacements component (selecting on
  # `kind: SecretProviderClass` without a name hits this SPC plus the
  # base auth-provider SPC).
  parameters:
    usePodIdentity: "false"
    clientID: $(WORKLOAD_IDENTITY_CLIENT_ID)
    keyvaultName: $(KV_NAME)
    tenantId: $(AZURE_TENANT_ID)
    objects: |
      array:
        - |
          objectName: pilotswarm-portal-tls
          objectType: secret
  secretObjects:
    - secretName: pilotswarm-portal-tls
      type: kubernetes.io/tls
      data:
        - objectName: pilotswarm-portal-tls
          key: tls.key
        - objectName: pilotswarm-portal-tls
          key: tls.crt
