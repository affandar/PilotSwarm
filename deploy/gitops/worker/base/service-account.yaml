apiVersion: v1
kind: ServiceAccount
metadata:
  name: copilot-runtime-worker
  namespace: copilot-runtime
  labels:
    app.kubernetes.io/name: pilotswarm
    app.kubernetes.io/component: worker
  annotations:
    # Federated with the BaseInfra-provisioned UAMI (Phase 3). The
    # value is overlay-filled from WORKLOAD_IDENTITY_CLIENT_ID so
    # the SA's projected token authenticates the CSI driver's AKV
    # pulls and any future worker-initiated Azure SDK calls.
    azure.workload.identity/client-id: __WORKLOAD_IDENTITY_CLIENT_ID__
