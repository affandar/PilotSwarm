apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: copilot-worker-secrets
  labels:
    app.kubernetes.io/name: pilotswarm
    app.kubernetes.io/component: worker
spec:
  provider: azure
  # Synthesizes `copilot-worker-secrets` which envFrom mounts into the
  # worker container.
  #
  # Human-only secrets (prompted by new-env, populated by seed-secrets.mjs):
  #   • github-token         — required
  #   • anthropic-api-key    — required (sentinel when blank, stripped at startup)
  #
  # Auto-populated by Bicep `auto-secrets.bicep` (no operator input):
  #   • azure-oai-key        — Foundry primary key when foundryEnabled,
  #     `__PS_UNSET__` sentinel otherwise. The worker's sentinel-strip in
  #     packages/sdk/examples/worker.js drops AZURE_OAI_KEY when it sees
  #     the sentinel, so any catalog provider referencing
  #     `env:AZURE_OAI_KEY` is treated as unset and skipped at runtime.
  #     This keeps the SPC stamp-invariant — the same Kustomize base
  #     applies whether or not the stamp opted into Foundry.
  #
  # What used to be here but is no longer a KV secret in the bicep flow:
  #   • azure-storage-connection-string — eliminated. The worker uses
  #     managed identity (`PILOTSWARM_USE_MANAGED_IDENTITY=1` +
  #     `AZURE_STORAGE_ACCOUNT_URL` from the worker-env ConfigMap) and
  #     authenticates to Azure Blob Storage via the federated CSI UAMI.
  #     Storage Blob Data Contributor is granted in storage.bicep.
  #   • database-url         — now a config value composed at deploy time
  #     and projected via the worker-env ConfigMap (overlay .env →
  #     Kustomize substitution → envFrom configMapRef). Chunk C will
  #     replace it with a passwordless URL backed by AAD/workload identity.
  #
  # Token-style values like `$(WORKLOAD_IDENTITY_CLIENT_ID)` are
  # overlay-filled via Kustomize `replacements`.
  parameters:
    usePodIdentity: "false"
    clientID: $(WORKLOAD_IDENTITY_CLIENT_ID)
    keyvaultName: $(KV_NAME)
    tenantId: $(AZURE_TENANT_ID)
    objects: |
      array:
        - |
          objectName: github-token
          objectType: secret
        - |
          objectName: anthropic-api-key
          objectType: secret
        - |
          objectName: azure-oai-key
          objectType: secret
  secretObjects:
    # NOTE: the `data[].key` list below is mirrored in
    # deploy/scripts/lib/spc-keys-hash.mjs (WORKER_SPC_KEYS). Adding or
    # removing a key here REQUIRES updating that constant — otherwise
    # the pod-template hash won't reflect the change and existing pods
    # won't roll on first deploy of the new SPC.
    - secretName: copilot-worker-secrets
      type: Opaque
      data:
        - objectName: github-token
          key: GITHUB_TOKEN
        - objectName: anthropic-api-key
          key: ANTHROPIC_API_KEY
        - objectName: azure-oai-key
          key: AZURE_OAI_KEY
