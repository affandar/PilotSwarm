apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: copilot-worker-secrets
  namespace: copilot-runtime
  labels:
    app.kubernetes.io/name: pilotswarm
    app.kubernetes.io/component: worker
spec:
  provider: azure
  # Synthesizes `copilot-worker-secrets` which envFrom mounts into the
  # worker container. Every key mirrors a `--from-literal=` flag that
  # today's `scripts/deploy-aks.sh:104-117` writes to the shared
  # `copilot-runtime-secrets` imperative Secret (worker's half). AKV
  # object names use hyphenated lowercase (AKV naming rules); the
  # `secretObjects[].data[].key` fields preserve the exact env var
  # names the worker runtime reads, so the container env is
  # byte-identical to the imperative path (SC-006). Token-style values
  # like `$(WORKLOAD_IDENTITY_CLIENT_ID)` are overlay-filled via
  # Kustomize `replacements`.
  parameters:
    usePodIdentity: "false"
    clientID: $(WORKLOAD_IDENTITY_CLIENT_ID)
    keyvaultName: $(KV_NAME)
    tenantId: $(AZURE_TENANT_ID)
    objects: |
      array:
        - |
          objectName: database-url
          objectType: secret
        - |
          objectName: github-token
          objectType: secret
        - |
          objectName: azure-storage-connection-string
          objectType: secret
        - |
          objectName: azure-storage-container
          objectType: secret
        - |
          objectName: llm-endpoint
          objectType: secret
        - |
          objectName: llm-api-key
          objectType: secret
        - |
          objectName: llm-provider-type
          objectType: secret
        - |
          objectName: llm-api-version
          objectType: secret
        - |
          objectName: azure-fw-glm5-key
          objectType: secret
        - |
          objectName: azure-kimi-k25-key
          objectType: secret
        - |
          objectName: azure-oai-key
          objectType: secret
        - |
          objectName: azure-gpt51-key
          objectType: secret
        - |
          objectName: azure-model-router-key
          objectType: secret
        - |
          objectName: anthropic-api-key
          objectType: secret
  secretObjects:
    - secretName: copilot-worker-secrets
      type: Opaque
      data:
        - objectName: database-url
          key: DATABASE_URL
        - objectName: github-token
          key: GITHUB_TOKEN
        - objectName: azure-storage-connection-string
          key: AZURE_STORAGE_CONNECTION_STRING
        - objectName: azure-storage-container
          key: AZURE_STORAGE_CONTAINER
        - objectName: llm-endpoint
          key: LLM_ENDPOINT
        - objectName: llm-api-key
          key: LLM_API_KEY
        - objectName: llm-provider-type
          key: LLM_PROVIDER_TYPE
        - objectName: llm-api-version
          key: LLM_API_VERSION
        - objectName: azure-fw-glm5-key
          key: AZURE_FW_GLM5_KEY
        - objectName: azure-kimi-k25-key
          key: AZURE_KIMI_K25_KEY
        - objectName: azure-oai-key
          key: AZURE_OAI_KEY
        - objectName: azure-gpt51-key
          key: AZURE_GPT51_KEY
        - objectName: azure-model-router-key
          key: AZURE_MODEL_ROUTER_KEY
        - objectName: anthropic-api-key
          key: ANTHROPIC_API_KEY
