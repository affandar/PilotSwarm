# Phase 7 (FR-028): live-tenant OBO smoke. workflow_dispatch-only.
#
# Prerequisites (one-time, per-repo, NOT created by this workflow):
#
#   1. Federated-credential trust on the repo's CI service principal so
#      `azure/login@v2` can OIDC-exchange a `GITHUB_TOKEN` for an
#      Azure access token. Configured against AZURE_CLIENT_ID below.
#
#   2. Repo secrets:
#        AZURE_CLIENT_ID
#        AZURE_TENANT_ID
#        AZURE_SUBSCRIPTION_ID
#        OBO_SMOKE_USER_ADMISSION_TOKEN
#        OBO_SMOKE_USER_DOWNSTREAM_TOKEN
#
#      The two OBO_SMOKE_USER_* secrets carry freshly-acquired test-user
#      tokens — they MUST be rotated by an operator immediately before
#      triggering this workflow (typical Entra access-token lifetime
#      ~60 min). We deliberately do NOT acquire them in CI: device-code
#      is interactive, ROPC is SFI-blocked, and federated-user
#      assertions for the test user would require AAD app-grant
#      changes outside Phase 7's scope.
#
# Without those prerequisites, the run fails fast at the
# `Acquire AKS credentials` or `Run smoke` step with a clear error.
# Operators can trigger this workflow manually after deploying a
# stamp with OBO_SMOKE_ENABLED=true.

name: "Live OBO smoke"

on:
    workflow_dispatch:
        inputs:
            stamp:
                description: "Local-env name of the stamp to smoke (e.g., chkrawps10). Must have OBO_SMOKE_ENABLED=true and a populated deploy/envs/local/<stamp>/.env on this branch."
                required: true
                type: string
            profile:
                description: "Smoke profile to run."
                required: false
                default: "obo"
                type: string

concurrency:
    group: live-smoke-${{ inputs.stamp }}
    cancel-in-progress: false

jobs:
    smoke:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        permissions:
            id-token: write
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Node
              uses: actions/setup-node@v5
              with:
                  node-version: "24"

            - name: Install workspace deps
              run: npm ci

            # CRITICAL: load the stamp's deploy/envs/local/<stamp>/.env
            # into $GITHUB_ENV BEFORE the AKS login + smoke run. The
            # canonical key names are RESOURCE_GROUP / AKS_CLUSTER_NAME /
            # K8S_CONTEXT / K8S_NAMESPACE (see deploy/envs/template.env);
            # the smoke driver and `az aks get-credentials` reference
            # these by name. Without this step, $RESOURCE_GROUP /
            # $AKS_CLUSTER_NAME would be empty and `az aks
            # get-credentials` would fail with a confusing error.
            - name: Load stamp env
              run: |
                  set -euo pipefail
                  ENV_FILE="deploy/envs/local/${{ inputs.stamp }}/.env"
                  if [ ! -f "$ENV_FILE" ]; then
                      echo "::error::stamp env file not found at $ENV_FILE — make sure deploy/envs/local/${{ inputs.stamp }}/.env is committed on this branch"
                      exit 1
                  fi
                  for KEY in RESOURCE_GROUP AKS_CLUSTER_NAME K8S_CONTEXT K8S_NAMESPACE; do
                      VALUE=$(grep -E "^${KEY}=" "$ENV_FILE" | tail -n 1 | sed -E "s/^${KEY}=//" || true)
                      if [ -n "$VALUE" ] && [ "$VALUE" != "__PS_UNSET__" ]; then
                          echo "${KEY}=${VALUE}" >> "$GITHUB_ENV"
                      fi
                  done

            - name: Azure login (OIDC)
              uses: azure/login@v2
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

            - name: Acquire AKS credentials
              run: |
                  set -euo pipefail
                  if [ -z "${RESOURCE_GROUP:-}" ] || [ -z "${AKS_CLUSTER_NAME:-}" ]; then
                      echo "::error::RESOURCE_GROUP / AKS_CLUSTER_NAME not present after Load stamp env step"
                      exit 1
                  fi
                  az aks get-credentials \
                      --resource-group "$RESOURCE_GROUP" \
                      --name "$AKS_CLUSTER_NAME" \
                      --file "$RUNNER_TEMP/kubeconfig" \
                      --overwrite-existing

            - name: Run smoke
              env:
                  KUBECONFIG: ${{ runner.temp }}/kubeconfig
                  OBO_SMOKE_USER_ADMISSION_TOKEN: ${{ secrets.OBO_SMOKE_USER_ADMISSION_TOKEN }}
                  OBO_SMOKE_USER_DOWNSTREAM_TOKEN: ${{ secrets.OBO_SMOKE_USER_DOWNSTREAM_TOKEN }}
              run: |
                  npx pilotswarm smoke "${{ inputs.stamp }}" \
                      --profile "${{ inputs.profile }}" \
                      --auth from-env \
                      --skip-kube-bootstrap
