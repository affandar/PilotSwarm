#################################################################################
#                 PilotSwarm Release: Portal ServiceGroup (Prod)                #
#                                                                               #
# ServiceGroup: Microsoft.PilotSwarm.Portal                                     #
# Rollout:                                                                      #
#   deploy/ev2/Portal/Ev2AppDeployment/rolloutSpec.json                         #
#     — Single rollout with ordered steps:                                      #
#         1. PortalServiceInfra (ARM/Bicep: AFD origin + route, PLS approval)   #
#         2. UploadContainer    (push pilotswarm-portal image → regional ACR)   #
#         3. GenerateEnvForEv2  (materialize overlay .env from scope tokens)    #
#         4. DeployApplicationManifest (kubectl kustomize → upload to blob;     #
#             Flux on AKS reconciles portal manifests from there)               #
#                                                                               #
# Design choice:                                                                #
#   Portal service infra and app are combined in a SINGLE ServiceGroup and a    #
#   SINGLE rolloutSpec, matching the postgresql-fleet-manager PlaygroundService #
#   pattern ("EV2 at service granularity"). Step ordering via `dependsOn` gives #
#   us the same infra-before-app guarantee without multi-SG pipeline chaining.  #
#################################################################################

trigger: none

parameters:
- name: debug
  displayName: 'Enable debug output'
  type: boolean
  default: false
- name: overrideManagedValidation
  displayName: 'Override managed validation duration'
  type: boolean
  default: false
- name: managedValidationOverrideDurationInHours
  displayName: 'Bake time in hours if override is true'
  type: number
  default: 24
- name: rolloutType
  displayName: 'SDP rollout type'
  type: string
  default: normal
  values:
    - normal
    - globaloutage
    - emergency
- name: incidentId
  displayName: 'IcM incident id for globaloutage rollouts'
  type: number
  default: 0
- name: select
  displayName: 'EV2 region selection'
  type: string
  # FIXME: set at onboarding — align with Phase 5 region parameter files.
  default: 'regions(westus3)'

resources:
  repositories:
    - repository: templates
      type: git
      name: OneBranch.Pipelines/GovernedTemplates
      ref: refs/heads/main
  pipelines:
    - pipeline: PilotSwarm-CI-Build
      # FIXME: set at onboarding — must match the CI pipeline name registered in ADO.
      source: 'PilotSwarm CI Build'
      branch: main
      trigger: none

extends:
  template: v2/OneBranch.Official.CrossPlat.yml@templates
  parameters:
    featureFlags:
      WindowsHostVersion:
        Network: R1
    ev2ManagedSdpRolloutConfig:
      rolloutType: ${{ parameters.rolloutType }}
      overrideManagedValidationDuration: ${{ parameters.overrideManagedValidation }}
      managedValidationOverrideDurationInHours: ${{ parameters.managedValidationOverrideDurationInHours }}
      icmIncidentId: ${{ parameters.incidentId }}

    stages:
    # ---------------------------------------------------------------------------
    # Portal ServiceGroup — combined Infra + App (ordered via rolloutSpec.dependsOn)
    # ---------------------------------------------------------------------------
    - stage: PROD_PilotSwarm_Portal
      displayName: 'PROD: PilotSwarm Portal (Infra + App)'
      variables:
        ob_release_environment: Production
      jobs:
      - job: PROD_PilotSwarm_Portal
        displayName: 'Deploy: Portal ServiceGroup'
        pool:
          type: release
        steps:
          - download: PilotSwarm-CI-Build
            artifact: drop_PublishEv2Artifacts_PublishEv2

          - task: Bash@3
            displayName: 'Resolve IMAGE_TAG / HOLDING_ACR_LOGIN_SERVER from CI artifact'
            inputs:
              targetType: inline
              script: |
                set -euo pipefail
                ART='$(Pipeline.Workspace)/PilotSwarm-CI-Build/drop_PublishEv2Artifacts_PublishEv2/ev2'
                IMAGE_TAG="$(cat "$ART/IMAGE_TAG")"
                ACR="$(cat "$ART/HOLDING_ACR_LOGIN_SERVER")"
                echo "##vso[task.setvariable variable=IMAGE_TAG]$IMAGE_TAG"
                echo "##vso[task.setvariable variable=HOLDING_ACR_LOGIN_SERVER]$ACR"
                echo "Resolved IMAGE_TAG=$IMAGE_TAG ACR=$ACR"

          - task: vsrm-ev2.ev2-rollout.ev2-rollout-task.Ev2RARollout@2
            displayName: 'Ev2 Managed SDP Rollout — Portal'
            inputs:
              # FIXME: set at onboarding — ServiceGroup root name registered in ServiceTree.
              ServiceGroupOverride: 'Microsoft.PilotSwarm.Portal'
              EndpointProviderType: ApprovalService
              ApprovalServiceEnvironment: Production
              TaskAction: RegisterAndRollout
              SkipRegistrationIfExists: true
              ServiceRootPath: '$(Pipeline.Workspace)/PilotSwarm-CI-Build/drop_PublishEv2Artifacts_PublishEv2/ev2/Portal/Ev2AppDeployment'
              RolloutSpecPath: '$(Pipeline.Workspace)/PilotSwarm-CI-Build/drop_PublishEv2Artifacts_PublishEv2/ev2/Portal/Ev2AppDeployment/rolloutSpec.json'
              sdpStageMap: managed
              StageMapName: 'Microsoft.Azure.SDP.Standard'
              Select: ${{ parameters.select }}
              RolloutParameters: 'IMAGE_TAG=$(IMAGE_TAG);HOLDING_ACR_LOGIN_SERVER=$(HOLDING_ACR_LOGIN_SERVER)'
